version: "3.9"

# Local Postgres for development and tests.
#
#   docker compose up -d postgres
#
# Port 5433 (not 5432) so this never collides with a Postgres already running
# on your machine. Connection strings live in apps/web/.env.local — see
# .env.example.
services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pal
      POSTGRES_PASSWORD: pal
      POSTGRES_DB: pal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pal_pgdata:/var/lib/postgresql/data

volumes:
  pal_pgdata:

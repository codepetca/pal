<svg width="680" height="520" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>How one event flows through Pal</title>
  <desc>An integration event enters the pure evaluate function, which returns mutations. Handlers apply the mutations and emit derived events, which are fed back into evaluate for up to four rounds before the state settles.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }
  </style>

  <rect x="180" y="50" width="200" height="44" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="280" y="70" text-anchor="middle" fill="#2C2C2A">assignment.completed</text>
  <text class="ts" x="280" y="86" text-anchor="middle" fill="#5F5E5A">sent by Pika</text>

  <line x1="280" y1="94" x2="280" y2="122" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="180" y="124" width="200" height="44" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="280" y="144" text-anchor="middle" fill="#26215C">evaluate()</text>
  <text class="ts" x="280" y="160" text-anchor="middle" fill="#3C3489">pure, no side effects</text>

  <line x1="280" y1="168" x2="280" y2="196" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="180" y="198" width="200" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="280" y="218" text-anchor="middle" fill="#04342C">mutations</text>
  <text class="ts" x="280" y="234" text-anchor="middle" fill="#085041">xp +150, xp +50, mood</text>

  <line x1="280" y1="242" x2="280" y2="270" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="180" y="272" width="200" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="280" y="292" text-anchor="middle" fill="#04342C">handlers apply them</text>
  <text class="ts" x="280" y="308" text-anchor="middle" fill="#085041">one transaction</text>

  <line x1="280" y1="316" x2="280" y2="344" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="180" y="346" width="200" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="280" y="366" text-anchor="middle" fill="#04342C">derived events</text>
  <text class="ts" x="280" y="382" text-anchor="middle" fill="#085041">fed back, max 4 rounds</text>

  <path d="M380 368 H520 V146 H382" fill="none" stroke="#534AB7" stroke-width="0.5" marker-end="url(#arrow-purple)"/>

  <line x1="280" y1="390" x2="280" y2="418" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="180" y="420" width="200" height="44" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="280" y="440" text-anchor="middle" fill="#2C2C2A">settled state</text>
  <text class="ts" x="280" y="456" text-anchor="middle" fill="#5F5E5A">pet, world, economy</text>

  <rect x="180" y="488" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="ts" x="196" y="497" fill="#2C2C2A">engine — pure</text>
  <rect x="310" y="488" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="326" y="497" fill="#2C2C2A">applier — writes state</text>
</svg>
